    if (!container) return;
    container.innerHTML = '';
    
    fullQuestionSet.forEach(q => {
      const selectedLetter = userSelections.get(q.id) || null;
      let isCorrect = false;
      if (selectedLetter) {
        isCorrect = (selectedLetter === q.correct);
      }
      
      const card = document.createElement('div');
      card.className = 'question-card';
      
      const headerDiv = document.createElement('div');
      headerDiv.className = 'question-header';
      headerDiv.innerHTML = `<span class="q-num">Q${q.id}</span><span class="q-text">${escapeHtml(q.text)}</span>`;
      card.appendChild(headerDiv);
      
      const optionsDiv = document.createElement('div');
      optionsDiv.className = 'options';
      
      const optionLetters = ['A', 'B', 'C', 'D'];
      q.options.forEach((opt, idx) => {
        const letter = optionLetters[idx];
        const isChecked = (selectedLetter === letter);
        const radioId = `q${q.id}_${letter}`;
        
        const optionItem = document.createElement('label');
        optionItem.className = 'option-item';
        optionItem.setAttribute('for', radioId);
        
        const radio = document.createElement('input');
        radio.type = 'radio';
        radio.name = `question_${q.id}`;
        radio.value = letter;
        radio.id = radioId;
        radio.checked = isChecked;
        radio.addEventListener('change', (e) => {
          e.stopPropagation();
          handleSelect(q.id, letter);
        });
        
        const letterSpan = document.createElement('span');
        letterSpan.className = 'option-letter';
        letterSpan.innerText = `${letter}.`;
        
        const textSpan = document.createElement('span');
        textSpan.className = 'option-text';
        textSpan.innerText = `${opt}`;
        
        optionItem.appendChild(radio);
        optionItem.appendChild(letterSpan);
        optionItem.appendChild(textSpan);
        optionsDiv.appendChild(optionItem);
      });
      
      card.appendChild(optionsDiv);
      
      const feedbackDiv = document.createElement('div');
      feedbackDiv.className = 'feedback';
      
      if (selectedLetter) {
        if (isCorrect) {
          feedbackDiv.classList.add('correct');
          feedbackDiv.innerHTML = `Correct!`;
        } else {
          feedbackDiv.classList.add('wrong');
          const correctText = getCorrectOptionText(q);
          feedbackDiv.innerHTML = `Wrong. The correct answer is ${q.correct}: ${escapeHtml(correctText)}`;
        }
      } else {
        feedbackDiv.classList.add('neutral');
        feedbackDiv.innerHTML = `Select an option to check your answer.`;
      }
      
      card.appendChild(feedbackDiv);
      container.appendChild(card);
    });
  }
  
  function handleSelect(questionId, selectedLetter) {
    userSelections.set(questionId, selectedLetter);
    renderQuestions();
  }
  
  function resetAll() {
    userSelections.clear();
    renderQuestions();
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  renderQuestions();
  document.getElementById('resetAllBtn')?.addEventListener('click', resetAll);
</script>
</body>
</html>
